# Site settings
# Site settings
title: Dingyi's Blog # 网站主标题
SEOTitle: 赵丁艺的博客 | Zhao Dingyi # 浏览器标签页上显示的标题，利于 SEO
header-img: img/home-bg.jpg # 首页背景图路径
email: your-email@example.com # 换成你的常用邮箱
description: "这里是赵丁艺的个人博客，记录代码、科研与生活。" # 网站的简短介绍
keyword: "赵丁艺, 博客, 计算机科学, 联邦学习, BanG Dream!, 武汉大学, CS" # 搜索引擎抓取的关键词
url: "https://WHUZhaoDingyi.github.io" # 必须换成你真实的 GitHub Pages 链接
baseurl: "" # 保持为空即可

# Publish posts or collection documents with a future date.
future: true

# SNS settings
# SNS settings
RSS: true # 建议打开，方便别人订阅你的博客
weibo_username: 你的微博ID # 如果不用可以加 # 注释掉
zhihu_username: 你的知乎ID
github_username: WHUZhaoDingyi # 填上你的用户名，图标会自动链向你的 GitHub
#facebook_username:  huxpro
#linkedin_username:  firstname-lastname-idxxxx

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
#timezone: CN

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
disqus_username: hux

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics
ga_track_id: "UA-49627206-1" # Format: UA-xxxxxx-xx
ga_domain: huangxuan.me

# Sidebar settings
sidebar: true # 保持开启
sidebar-about-description: "Hope you happy, my friend. <br> CS @ WHU" # 可以用 <br> 换行
sidebar-avatar: https://github.com/WHUZhaoDingyi.png # 填入你的 GitHub 头像链接，或者本地图片路径如 img/avatar.jpg

# Featured Tags
featured-tags: true # whether or not using Feature-Tags
featured-condition-size: 1 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: true

# Friends
friends:
